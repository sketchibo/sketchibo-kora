name: Build KORA Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'bridge/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'bridge/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Make gradlew executable
      working-directory: ./bridge
      run: chmod +x gradlew
      
    - name: Build Debug APK
      working-directory: ./bridge
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kora-bridge-debug
        path: bridge/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Build Release APK
      working-directory: ./bridge
      run: ./gradlew assembleRelease --stacktrace
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: kora-bridge-release
        path: bridge/app/build/outputs/apk/release/app-release-unsigned.apk
